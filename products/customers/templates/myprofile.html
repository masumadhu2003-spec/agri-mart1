{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriMart</title>
    <link rel="stylesheet" href="{% static 'css/myprofile.css' %}">
</head>
<body class="venkatesh">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css" integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" crossorigin="anonymous">
    <h1 class="header">AgriMart</h1>
    <section>
        <nav class="navbar">
            <div class="container">
                <a class="navbar-brand" href="#">Agri Mart</a>
                <button class="navbar-toggler" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="navbar-menu">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link " href="{%url 'fertilizers'%}"><i class="fas fa-dot-circle"></i>fertilizers</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link " href="{%url 'liquids'%}"><i class="fas fa-dot-circle"></i>liquids</a>
                        </li>
                        <li class="nav-item ">
                            <a class="nav-link  " href="{%url 'powders'%}" role="button"><i class="fas fa-dot"></i>powders
                              
                            </a>
                        </il>
                        <li class="nav-item">
                            <a class="nav-link  " href="{%url 'myprofile'%}" aria-disabled="true"><i class="fa fa-user-circle" aria-hidden="true"></i>myprofile</a>
                        </li>
                    </ul>
                   
                </div>
            </div>
            
        </nav>
        <div class="myprofile-container">
            <div>
            <h2 class="venky">myprofile</h2>
            <form class="register-form">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" value="{{ user.first_name }} {{ user.last_name }}" readonly>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ user.email }}" readonly>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" value="{{ user.password }}" readonly>

            <label for="content">Address</label>
            <input type="text" id="content" name="content" value="{{ user.address }}" readonly>

            <button type="submit" disabled>My Profile</button>
        </form>
        </div>
        <li class="nav-item">
            <a class="nav-link" href="{% url 'Login' %}"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </li>

        </div>
       
    
        
</body>
</html>
