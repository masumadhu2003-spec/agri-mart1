{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriMart</title>
    <link rel="stylesheet" href="{% static 'css/Login.css' %}">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css" integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" crossorigin="anonymous">
</head>
<body>
    <h1 class="header">AgriMart</h1>
    <section>
        <nav class="navbar">
            <div class="container">
                <a class="navbar-brand" href="#">Agri Mart</a>
                <button class="navbar-toggler" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="navbar-menu">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link " href="{% url 'home' %}"><i class="fa fa-home"></i> Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link " href="{% url 'About' %}"><i class="fa fa-user-circle" aria-hidden="true"></i> About</a>
                        </li>
                        <li class="nav-item ">
                            <a class="nav-link " href="{% url 'Register' %}" >
                                <i class="fa fa-registered"></i> Register
                            </a>
                            </il> 
                      
                        <li class="nav-item">
                            <a class="nav-link active" href="{% url 'Login' %}"aria-disabled="true"><i class="fa fa-sign-in-alt"></i> Login</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </section>
    <main>
        <section id="login-form">
            <div class="container">

                <h2>Login to Your Account</h2>
                    {% if messages %}
                        <ul class="messages">
                            {% for message in messages %}
                                <li {% if message.tags %} class="{{ message.tags }}"{% endif %}> {{ message }} </li>
                            {% endfor %}
                        </ul>
                    {% endif %}
                <form method="post" action="{% url 'Login' %}">
                    {% csrf_token %}
                    <input type="email" class="input" name="email" placeholder="Email" required>
                    <input type="password" class="input" name="password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
               
            </div>
        </section>
    </main>
</body>
</html>
