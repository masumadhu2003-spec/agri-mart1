{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriMart</title>
    <link rel="stylesheet" href="{% static 'css/Register.css' %}">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css" integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" crossorigin="anonymous">
</head>
<body>
    <h1 class="header">AgriMart</h1>
    <section>
        <nav class="navbar">
            <div class="container">
                <a class="navbar-brand" href="#">Agri Mart</a>
                <button class="navbar-toggler" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="navbar-menu">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link " href="{% url 'home' %}"><i class="fa fa-home"></i> Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link " href="{% url 'About' %}"><i class="fa fa-user-circle" aria-hidden="true"></i> About</a>
                        </li>
                        <li class="nav-item ">
                            <a class="nav-link active" href="{% url 'Register' %}" >
                                <i class="fa fa-registered"></i> Register
                            </a>
                            </il> 
                      
                        <li class="nav-item">
                            <a class="nav-link " href="{% url 'Login' %}"aria-disabled="true"><i class="fa fa-sign-in-alt"></i> Login</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </section>
    <main>
        <section id="register-form">
            <div class="container2">
                    {% if messages %}
                        <ul class="messages">
                            {% for message in messages %}
                                <li {% if message.tags %} class="{{ message.tags }}"{% endif %}> {{ message }} </li>
                            {% endfor %}
                        </ul>
                    {% endif %}
                    <form method="post" action="{% url 'Register' %}" style="max-width: 600px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; background: #fff;">
                        {% csrf_token %}
                        <h2 style="text-align: center; color: #3498db; margin-bottom: 20px;">Create an Account</h2>

                        <div style="display: flex; flex-direction: column; gap: 15px;">

                            <!-- Name -->
                            <div style="display: flex; align-items: center;">
                                <label for="first_name" style="width: 150px;">First Name:</label>
                                <input class="input" type="text" name="first_name" placeholder="First Name" required style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 5px;">
                            </div>

                            <!-- Last Name -->
                            <div style="display: flex; align-items: center;">
                                <label for="last_name" style="width: 150px;">Last Name:</label>
                                <input class="input" type="text" name="last_name" placeholder="Last Name" required style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 5px;">
                            </div>

                            <!-- Email -->
                            <div style="display: flex; align-items: center;">
                                <label for="email" style="width: 150px;">Email:</label>
                                <input class="input" type="email" name="email" placeholder="Email" required style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 5px;">
                            </div>

                            <!-- Phone Number -->
                            <div style="display: flex; align-items: center;">
                                <label for="phone_number" style="width: 150px;">Phone Number:</label>
                                <input class="input" type="text" name="phone_number" placeholder="Phone Number" required style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 5px;">
                            </div>

                            <!-- Address -->
                            <div style="display: flex; align-items: center;">
                                <label for="address" style="width: 150px;">Address:</label>
                                <textarea class="input" name="address" placeholder="Address" required style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 5px;"></textarea>
                            </div>

                            <!-- Password -->
                            <div style="display: flex; align-items: center;">
                                <label for="password" style="width: 150px;">Password:</label>
                                <input class="input" type="password" name="password" placeholder="Password" required style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 5px;">
                            </div>

                            <!-- Confirm Password -->
                            <div style="display: flex; align-items: center;">
                                <label for="confirm_password" style="width: 150px;">Confirm Password:</label>
                                <input class="input" type="password" name="confirm_password" placeholder="Confirm Password" required style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 5px;">
                            </div>

                            <!-- Button -->
                            <div style="text-align: center; margin-top: 20px;">
                                <button type="submit" style="padding: 10px 30px; background-color: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">Register</button>
                            </div>
                        </div>
                    </form>

            </div>
        </section>
    </main>
</body>
</html>
